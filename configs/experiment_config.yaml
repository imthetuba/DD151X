dataset:
  input_csv: data/modeling_dataset_step1.csv
  target_column: risk_class_3
  group_column: organization_number

split:
  test_size: 0.2
  random_state: 42
  strategies:
    - stratified
    - grouped

training:
  class_weight_mode: balanced
  resampling: none

feature_sets:
  financial_only:
    - enterprise_value
    - revenue
    - book_value_equity
    - book_value_debt
    - debt_to_equity_ratio
  esg_only:
    - total_ghg_emission
    - scope1
    - scope2_location
    - carbon_intensity
    - carbon_target
    - high_impact_climate_sector
    - fossil_fuel_sector
    - report_biodiversity
    - negative_affect_biodiversity
    - exp_controversial_weapons
    - exp_controversial_products
    - exp_debt_collection_or_loans
    - female_board
    - male_board
    - female_board_share
  esg_financial:
    - enterprise_value
    - revenue
    - book_value_equity
    - book_value_debt
    - debt_to_equity_ratio
    - total_ghg_emission
    - scope1
    - scope2_location
    - carbon_intensity
    - carbon_target
    - high_impact_climate_sector
    - fossil_fuel_sector
    - report_biodiversity
    - negative_affect_biodiversity
    - exp_controversial_weapons
    - exp_controversial_products
    - exp_debt_collection_or_loans
    - female_board
    - male_board
    - female_board_share

models:
  logistic_regression:
    family: linear
    params:
      C: 1.0
      max_iter: 2000
      solver: lbfgs
      multi_class: multinomial
  naive_bayes:
    family: probabilistic
    params: {}
  random_forest:
    family: tree_ensemble
    params:
      n_estimators: 500
      random_state: 42
      n_jobs: -1
  xgboost:
    family: boosting
    params:
      n_estimators: 500
      learning_rate: 0.05
      max_depth: 4
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42
      objective: multi:softprob
      eval_metric: mlogloss

outputs:
  root: outputs
  splits: outputs/01_splits
  trained_models: outputs/02_trained_models
  metrics: outputs/03_metrics
  plots: outputs/04_plots
  feature_importance: outputs/05_feature_importance
  predictions: outputs/06_predictions
  reports: outputs/07_reports
